<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarkM Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --accent: #c8f55a;
      --text: #f0f0f0;
      --muted: #555;
      --border: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    h1 span {
      color: var(--accent);
    }

    p.desc {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 300;
      color: #888;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .apps {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .app-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      color: #aaa;
      transition: border-color 0.2s, color 0.2s;
    }

    .app-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200, 245, 90, 0.25);
    }

    .contact-btn svg {
      width: 16px;
      height: 16px;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- <div class="badge">Android Developer</div> -->

    <h1>Mark<span>M</span><br/>Dev</h1>

      Building simple, useful Android apps.<br/>
      Got a question or issue? Reach out anytime.
    </p> -->

      <span class="app-tag">Spin It</span>
      <span class="app-tag">Simple Notes</span>
      <span class="app-tag">Call Stats</span>
    </div> -->

    <a class="contact-btn" href="mailto:markm.dev@gmail.com">

        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      markm.dev@gmail.com
    </a>
  </div>

  <div class="footer">© 2026 MarkM Dev · All rights reserved</div>

</body>
</html>
