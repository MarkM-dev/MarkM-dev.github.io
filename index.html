<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarkM Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --accent: #00E5FF;
      --text: #f0f0f0;
      --muted: #555;
      --border: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    #accent-m {
      color: var(--accent);
      transition: color 0.9s ease;
      display: inline-block;
    }

    .btn-wrap {
      position: relative;
      display: inline-block;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .contact-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      will-change: transform;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,255,0.2);
    }

    #btn-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 0;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }

    .btn-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      pointer-events: none;
    }

    .contact-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Mark<span id="accent-m">M</span><br/>Dev</h1>

    <div class="btn-wrap" id="btn-wrap">
      <a class="contact-btn" id="email-btn" href="mailto:markm.dev@gmail.com">
        <div id="btn-fill"></div>
        <span class="btn-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          markm.dev@gmail.com
        </span>
      </a>
    </div>
  </div>

  <div class="footer">© 2026 MarkM Dev · All rights reserved</div>

<script>
(function () {

const PALETTE = [
  '#00E5FF','#CCFF00','#FF4081','#FF6D00',
  '#FFEA00','#00E676','#FF1744','#FF9100',
  '#F50057','#76FF03','#FFD600','#E040FB',
];

let colorIdx = 0, lastAnimI = -1, busy = false;

const accentM  = document.getElementById('accent-m');
const emailBtn = document.getElementById('email-btn');
const btnFill  = document.getElementById('btn-fill');

function luma(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255;
}
function textFor(hex) { return luma(hex)>0.52?'#0a0a0a':'#f0f0f0'; }
function setColor(c) {
  emailBtn.style.backgroundColor=c;
  emailBtn.style.color=textFor(c);
  accentM.style.color=c;
}
function nextColor() {
  let i; do{i=Math.floor(Math.random()*PALETTE.length);}while(i===colorIdx);
  colorIdx=i; return PALETTE[i];
}
function kf(name,body) {
  if(!document.getElementById('kf-'+name)){
    const s=document.createElement('style');
    s.id='kf-'+name; s.textContent=`@keyframes ${name}{${body}}`;
    document.head.appendChild(s);
  }
}
function pillPt(t,rc) {
  const r=rc.height/2, sw=rc.width-rc.height;
  const segs=[sw,Math.PI*r,sw,Math.PI*r];
  const tot=segs[0]+segs[1]+segs[2]+segs[3];
  let d=((t%1)+1)%1*tot;
  if(d<segs[0])return{x:rc.left+r+(d/segs[0])*sw,y:rc.top};
  d-=segs[0];
  if(d<segs[1]){const a=(d/segs[1])*Math.PI-Math.PI/2;return{x:rc.left+rc.width-r+Math.cos(a)*r,y:rc.top+r+Math.sin(a)*r};}
  d-=segs[1];
  if(d<segs[2])return{x:rc.left+rc.width-r-(d/segs[2])*sw,y:rc.top+rc.height};
  d-=segs[2];
  const a=(d/segs[3])*Math.PI+Math.PI/2;
  return{x:rc.left+r+Math.cos(a)*r,y:rc.top+r+Math.sin(a)*r};
}

/* 1 — ORBIT COMET */
function animOrbitComet(col,done){
  const rc=emailBtn.getBoundingClientRect();
  const tc=Object.assign(document.createElement('canvas'),{width:innerWidth,height:innerHeight});
  tc.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:800;';
  document.body.appendChild(tc);
  const tctx=tc.getContext('2d');
  const head=document.createElement('div');
  head.style.cssText=`position:fixed;z-index:801;width:10px;height:10px;border-radius:50%;
    background:${col};transform:translate(-50%,-50%);pointer-events:none;
    box-shadow:0 0 8px 4px ${col},0 0 22px 10px ${col}88;`;
  document.body.appendChild(head);
  const DUR=1300,t0=performance.now();
  (function step(now){
    const p=Math.min((now-t0)/DUR,1),ep=p<.5?2*p*p:-1+(4-2*p)*p;
    const pt=pillPt(ep,rc);
    tctx.globalAlpha=.3;tctx.fillStyle='#0a0a0a';tctx.fillRect(0,0,tc.width,tc.height);tctx.globalAlpha=1;
    tctx.shadowColor=col;tctx.shadowBlur=12;tctx.fillStyle=col+'99';
    tctx.beginPath();tctx.arc(pt.x,pt.y,3,0,Math.PI*2);tctx.fill();tctx.shadowBlur=0;
    head.style.left=pt.x+'px';head.style.top=pt.y+'px';
    if(p<1){requestAnimationFrame(step);return;}
    setColor(col);
    emailBtn.style.boxShadow=`0 0 0 3px ${col},0 0 40px 16px ${col}55`;
    emailBtn.style.transition='box-shadow .35s ease';
    setTimeout(()=>{emailBtn.style.boxShadow='';emailBtn.style.transition='';
      document.body.removeChild(head);document.body.removeChild(tc);done();},380);
  })(t0);
}

/* 2 — LIQUID FILL */
function animLiquidFill(col,done){
  btnFill.style.cssText=`position:absolute;top:0;left:0;bottom:0;width:0;
    background:${col};z-index:0;border-radius:999px;pointer-events:none;`;
  const DUR=680,t0=performance.now(),bw=emailBtn.offsetWidth;
  let sw=false;
  (function step(now){
    const p=Math.min((now-t0)/DUR,1),e=p<.5?2*p*p:-1+(4-2*p)*p;
    btnFill.style.width=e*bw+'px';
    if(p>=.5&&!sw){sw=true;emailBtn.style.color=textFor(col);}
    if(p<1){requestAnimationFrame(step);return;}
    setColor(col);btnFill.style.width='0';done();
  })(t0);
}

/* 3 — RIPPLE BURST */
function animRippleBurst(col,done){
  const rc=emailBtn.getBoundingClientRect();
  const cx=rc.left+rc.width/2,cy=rc.top+rc.height/2;
  let fin=0;
  for(let i=0;i<3;i++){
    const ring=document.createElement('div');
    ring.style.cssText=`position:fixed;border-radius:50%;
      border:2px solid ${col};box-shadow:0 0 12px ${col}88,inset 0 0 12px ${col}44;
      transform:translate(-50%,-50%);pointer-events:none;z-index:800;
      left:${cx}px;top:${cy}px;`;
    document.body.appendChild(ring);
    setTimeout(()=>{
      const t0=performance.now();
      (function step(now){
        const p=Math.min((now-t0)/950,1);
        ring.style.width=ring.style.height=p*260+'px';ring.style.opacity=String(1-p);
        if(p<1){requestAnimationFrame(step);return;}
        document.body.removeChild(ring);
        if(++fin===3){setColor(col);done();}
      })(t0);
    },i*190);
  }
}

/* 4 — CHROMATIC GLITCH */
function animGlitch(col,done){
  kf('glitch-jit',`
    0%{transform:translate(0,0)skewX(0)}8%{transform:translate(-5px,2px)skewX(-4deg)}
    16%{transform:translate(6px,-2px)skewX(3deg)}24%{transform:translate(-4px,1px)skewX(-2deg)}
    32%{transform:translate(5px,0)skewX(4deg)}40%{transform:translate(-6px,-1px)skewX(-3deg)}
    48%{transform:translate(3px,2px)skewX(2deg)}56%{transform:translate(-3px,-2px)skewX(-4deg)}
    64%{transform:translate(5px,1px)skewX(3deg)}80%{transform:translate(3px,-1px)skewX(2deg)}
    100%{transform:translate(0,0)skewX(0)}`);
  const pulses=['4px 0 #ff003366,-4px 0 #0033ff66','-5px 0 #ff003366,5px 0 #0033ff66',
    '3px 0 #ff003366,-3px 0 #0033ff66','0 0 transparent'];
  let pi=0;
  const iv=setInterval(()=>{emailBtn.style.textShadow=pulses[pi++%pulses.length];},80);
  emailBtn.style.animation='glitch-jit 640ms steps(1) forwards';
  setTimeout(()=>{
    clearInterval(iv);emailBtn.style.animation='';emailBtn.style.textShadow='';
    setColor(col);emailBtn.style.filter='brightness(2.2)';
    setTimeout(()=>{emailBtn.style.filter='';done();},70);
  },650);
}

/* 5 — NEON SCAN */
function animNeonScan(col,done){
  const reveal=document.createElement('div');
  reveal.style.cssText=`position:absolute;top:0;left:0;height:100%;width:0;
    background:${col};z-index:0;pointer-events:none;`;
  const beam=document.createElement('div');
  beam.style.cssText=`position:absolute;top:-4px;bottom:-4px;left:0;width:6px;
    background:linear-gradient(to right,${col}00,#fff,${col}00);
    filter:blur(3px);z-index:2;pointer-events:none;`;
  emailBtn.appendChild(reveal);emailBtn.appendChild(beam);
  const DUR=700,t0=performance.now(),bw=emailBtn.offsetWidth;
  let sw=false;
  (function step(now){
    const p=Math.min((now-t0)/DUR,1),e=p<.5?2*p*p:-1+(4-2*p)*p,x=e*bw;
    reveal.style.width=x+'px';beam.style.left=x-3+'px';
    if(p>.5&&!sw){sw=true;emailBtn.style.color=textFor(col);}
    if(p<1){requestAnimationFrame(step);return;}
    emailBtn.removeChild(reveal);emailBtn.removeChild(beam);setColor(col);done();
  })(t0);
}

/* 6 — ELASTIC BOUNCE */
function animElasticBounce(col,done){
  kf('el-bounce',`
    0%{transform:scaleX(1)scaleY(1)translateY(0)}
    12%{transform:scaleX(1.18)scaleY(.82)translateY(8px)}
    28%{transform:scaleX(.88)scaleY(1.15)translateY(-22px)}
    42%{transform:scaleX(1.1)scaleY(.9)translateY(7px)}
    56%{transform:scaleX(.94)scaleY(1.06)translateY(-10px)}
    68%{transform:scaleX(1.04)scaleY(.97)translateY(4px)}
    80%{transform:scaleX(.98)scaleY(1.02)translateY(-4px)}
    90%{transform:scaleX(1.01)scaleY(.99)translateY(1px)}
    100%{transform:scaleX(1)scaleY(1)translateY(0)}`);
  emailBtn.style.transformOrigin='center bottom';
  emailBtn.style.animation='el-bounce 900ms cubic-bezier(.4,0,.2,1) forwards';
  setTimeout(()=>{setColor(col);},110);
  setTimeout(()=>{emailBtn.style.animation='';emailBtn.style.transformOrigin='';done();},920);
}

/* 7 — GLOW BLOOM */
function animGlowBloom(col,done){
  const DUR=1000,t0=performance.now();let sw=false;
  (function step(now){
    const p=Math.min((now-t0)/DUR,1);
    const glow=p<.42?p/.42:1-(p-.42)/.58,a=glow*40,b=glow*22;
    emailBtn.style.boxShadow=`0 0 ${a}px ${b}px ${col}77,0 0 ${a*1.8}px ${b*2}px ${col}33`;
    if(p>=.42&&!sw){sw=true;setColor(col);}
    if(p<1){requestAnimationFrame(step);return;}
    emailBtn.style.boxShadow='';done();
  })(t0);
}

/* 8 — MAGNETIC SHIVER */
function animMagneticShiver(col,done){
  kf('shiver',`
    0%,100%{transform:translate(0,0)rotate(0)}
    10%{transform:translate(-3px,-2px)rotate(-.8deg)}20%{transform:translate(3px,2px)rotate(.8deg)}
    30%{transform:translate(-4px,1px)rotate(-.6deg)}40%{transform:translate(4px,-1px)rotate(.6deg)}
    50%{transform:translate(-2px,2px)rotate(-.4deg)}60%{transform:translate(3px,-2px)rotate(.4deg)}
    70%{transform:translate(-3px,0)rotate(-.3deg)}80%{transform:translate(2px,1px)rotate(.3deg)}
    90%{transform:translate(-1px,-1px)rotate(-.1deg)}`);
  emailBtn.style.animation='shiver 700ms linear forwards';
  const rc=emailBtn.getBoundingClientRect(),cx=rc.left+rc.width/2,cy=rc.top+rc.height/2;
  [0,220].forEach(delay=>{
    setTimeout(()=>{
      const ring=document.createElement('div');
      ring.style.cssText=`position:fixed;border-radius:50%;border:1.5px solid ${col}99;
        transform:translate(-50%,-50%);pointer-events:none;z-index:800;left:${cx}px;top:${cy}px;`;
      document.body.appendChild(ring);
      const t0b=performance.now();
      (function s(now){
        const p=Math.min((now-t0b)/700,1);
        ring.style.width=ring.style.height=p*180+'px';ring.style.opacity=String(1-p);
        if(p<1){requestAnimationFrame(s);}else{document.body.removeChild(ring);}
      })(t0b);
    },delay);
  });
  setTimeout(()=>{
    emailBtn.style.animation='';setColor(col);
    const fla=document.createElement('div');
    fla.style.cssText=`position:absolute;inset:0;background:#fff;
      border-radius:999px;opacity:.9;pointer-events:none;z-index:10;`;
    emailBtn.appendChild(fla);let op=.9;
    (function fade(){op-=.07;fla.style.opacity=op;
      if(op>0){requestAnimationFrame(fade);}else{emailBtn.removeChild(fla);done();}})();
  },720);
}

/* 9 — PARTICLE BURST */
function animParticleBurst(col,done){
  const rc=emailBtn.getBoundingClientRect();
  const cx=rc.left+rc.width/2,cy=rc.top+rc.height/2;
  const N=22;
  const particles=Array.from({length:N},(_,i)=>{
    const angle=(i/N)*Math.PI*2+(Math.random()-.5)*.6;
    const speed=2.5+Math.random()*5.5;
    const size=3+Math.random()*6;
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;z-index:800;width:${size}px;height:${size}px;
      border-radius:50%;background:${col};pointer-events:none;
      box-shadow:0 0 ${size+2}px 2px ${col};
      transform:translate(-50%,-50%);left:${cx}px;top:${cy}px;`;
    document.body.appendChild(el);
    return{el,x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,op:1};
  });
  const DUR=800,t0=performance.now();let sw=false;
  (function step(now){
    const prog=Math.min((now-t0)/DUR,1);
    if(prog>=.25&&!sw){sw=true;setColor(col);}
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.vx*=.97;
      p.op=Math.max(0,1-prog*1.3);
      p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';p.el.style.opacity=String(p.op);
    });
    if(prog<1){requestAnimationFrame(step);return;}
    particles.forEach(p=>document.body.removeChild(p.el));done();
  })(t0);
}

/* SCHEDULER */
const ANIMS=[animOrbitComet,animLiquidFill,animRippleBurst,animGlitch,
  animNeonScan,animElasticBounce,animGlowBloom,animMagneticShiver,animParticleBurst];

function trigger(){
  if(busy)return; busy=true;
  const col=nextColor();
  let ai; do{ai=Math.floor(Math.random()*ANIMS.length);}while(ai===lastAnimI);
  lastAnimI=ai;
  ANIMS[ai](col,()=>{busy=false;setTimeout(trigger,10000);});
}
setTimeout(trigger,10000);

})();
</script>
</body>
</html>
